name: Dependency Updates

on:
  schedule:
    # Run weekly on Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-dependencies:
    name: Check for Dependency Updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install podman-compose
        run: pip install podman-compose

      - name: Check for container image updates
        run: |
          echo "Checking for container image updates..."
          podman-compose pull || true
          podman images --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}\t{{.CreatedAt}}"

      - name: Check Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true
          pip-audit -r dashboard/backend/requirements.txt || true

      - name: Create update report
        run: |
          echo "# Dependency Update Report" > update-report.md
          echo "" >> update-report.md
          echo "Generated on: $(date)" >> update-report.md
          echo "" >> update-report.md
          echo "## Container Images" >> update-report.md
          podman-compose config --images >> update-report.md || true
          echo "" >> update-report.md
          echo "## Python Audit" >> update-report.md
          pip-audit -r requirements.txt --format json >> update-report.md 2>/dev/null || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: update-report.md
          retention-days: 30
