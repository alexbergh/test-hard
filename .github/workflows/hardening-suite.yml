name: Hardening suite CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r dashboard/backend/requirements.txt
          python -m pip install pytest pytest-cov pytest-mock pytest-asyncio aiosqlite
      - name: Run tests
        run: PYTHONPATH=dashboard/backend:$PYTHONPATH pytest tests/unit/ -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: |
          podman build -t ghcr.io/alexbergh/test-hard:ci -f Containerfile .
